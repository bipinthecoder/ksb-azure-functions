# -----------------------------------------------------------------------
# docker-compose.yml — KSB Azure Functions local development stack
# -----------------------------------------------------------------------
# Starts four services in the correct order:
#
#   1. azurite      — local Azure Blob Storage emulator
#   2. cosmosdb     — local Azure Cosmos DB emulator
#   3. init-storage — one-shot container that creates the required blob
#                     containers (uploads + sessions) inside Azurite
#   4. func         — the Azure Function app (our code)
#
# Secrets and configuration are read from .env (gitignored).
# Copy .env.example → .env and fill in the values before running.
#
# Usage:
#   docker compose up --build          # first time or after code changes
#   docker compose up                  # subsequent runs
#   docker compose down                # stop everything
#   docker compose down -v             # stop and wipe all stored data
# -----------------------------------------------------------------------

services:

  # -----------------------------------------------------------------------
  # 1. Azurite — local Azure Blob Storage emulator
  #    Exposes port 10000 (Blob only — we don't need Queue or Table).
  #    Blob data is stored in a named Docker volume so it persists between
  #    "docker compose down / up" cycles.
  # -----------------------------------------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: ksb-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"
    command: azurite-blob --blobHost 0.0.0.0 --loose
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(10000,'127.0.0.1').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # -----------------------------------------------------------------------
  # 2. Cosmos DB Emulator — local NoSQL database
  # -----------------------------------------------------------------------
  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
    container_name: ksb-cosmosdb
    restart: unless-stopped
    mem_limit: 3g
    ports:
      - "8081:8081"
      - "10251-10254:10251-10254"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 10
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "0.0.0.0"
    volumes:
      - cosmos_data:/tmp/cosmos/appdata
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  # -----------------------------------------------------------------------
  # 3. init-storage — one-shot setup container
  # -----------------------------------------------------------------------
  init-storage:
    build:
      context: .
      dockerfile: init.Dockerfile
    container_name: ksb-init-storage
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      AZURITE_CONNECTION_STRING: ${AZURITE_CONNECTION_STRING}
    restart: "no"

  # -----------------------------------------------------------------------
  # 4. func — the Azure Function app
  # -----------------------------------------------------------------------
  func:
    build: .
    container_name: ksb-func
    ports:
      - "7071:80"
    depends_on:
      init-storage:
        condition: service_completed_successfully
      cosmosdb:
        condition: service_healthy
    environment:
      AzureWebJobsStorage: ${AZURITE_CONNECTION_STRING}
      STORAGE_BLOB_BASE_URL: ${STORAGE_BLOB_BASE_URL}
      COSMOS_DB_ENDPOINT: ${COSMOS_DB_ENDPOINT}
      COSMOS_DB_KEY: ${COSMOS_DB_KEY}
      COSMOS_DB_DATABASE: ${COSMOS_DB_DATABASE}
      COSMOS_DB_CONTAINER: ${COSMOS_DB_CONTAINER}
      COSMOS_DB_DISABLE_SSL_VERIFY: ${COSMOS_DB_DISABLE_SSL_VERIFY}

volumes:
  azurite_data:
  cosmos_data: